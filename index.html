<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Clock Strip</title>
<style>
    body {
        margin: 0;
        background: transparent;
        font-family: Arial, sans-serif;
    }

    .strip {
        display: flex;
        gap: 8px;
        padding: 6px;
    }

    .box {
        background: rgba(40, 40, 40, 0.9);
        padding: 6px 14px;
        text-align: center;
        color: white;
        min-width: 110px;
    }

    .city {
        font-size: 13px;
        color: #cbd5e1;
        margin-bottom: 2px;
    }

    .time {
        font-size: 20px;
        font-weight: 700; /* bold */
        letter-spacing: 1px;
    }
</style>
</head>
<body>

<div class="strip">
    <div class="box"><div class="city">New York</div><div id="ny" class="time"></div></div>
    <div class="box"><div class="city">London</div><div id="ldn" class="time"></div></div>
    <div class="box"><div class="city">Paris</div><div id="paris" class="time"></div></div>
    <div class="box"><div class="city">Tokyo</div><div id="tokyo" class="time"></div></div>
</div>

<script>
function update() {
    const opt = {
        hour: '2-digit',
        minute: '2-digit',
        hour12: false
    };

    ny.textContent = new Date().toLocaleTimeString('en-US', {...opt, timeZone:'America/New_York'});
    ldn.textContent = new Date().toLocaleTimeString('en-GB', {...opt, timeZone:'Europe/London'});
    paris.textContent = new Date().toLocaleTimeString('en-GB', {...opt, timeZone:'Europe/Paris'});
    tokyo.textContent = new Date().toLocaleTimeString('en-GB', {...opt, timeZone:'Asia/Tokyo'});
}

function loop(){
    update();
    setTimeout(loop, 1000 - new Date().getMilliseconds());
}
loop();
</script>

</body>
</html>
